    <script type="text/babel" data-presets="react">
        const API_URL = "https://ubriga.pythonanywhere.com";
        const RECAPTCHA_SITE_KEY = "6LfYemYsAAAAAEnvLZ5sSMiijpBL8P0qqITx_RNL";

        const { useState, useEffect, useMemo } = React;

        const getHebrewNumber = (num) => {
            if (num <= 0) return "";
            const letters = [{v:400,c:'ת'},{v:300,c:'ש'},{v:200,c:'ר'},{v:100,c:'ק'},{v:90,c:'צ'},{v:80,c:'פ'},{v:70,c:'ע'},{v:60,c:'ס'},{v:50,c:'נ'},{v:40,c:'מ'},{v:30,c:'ל'},{v:20,c:'כ'},{v:10,c:'י'},{v:9,c:'ט'},{v:8,c:'ח'},{v:7,c:'ז'},{v:6,c:'ו'},{v:5,c:'ה'},{v:4,c:'ד'},{v:3,c:'ג'},{v:2,c:'ב'},{v:1,c:'א'}];
            let str = "", temp = num;
            if (temp === 15) return "טו"; if (temp === 16) return "טז";
            for (let l of letters) { while(temp >= l.v) { str += l.c; temp -= l.v; } }
            return str.length === 1 ? str+"'" : str.slice(0,-1)+'"'+str.slice(-1);
        };

        const generateGemaraPages = (cnt) => {
            const p = [];
            for(let i=2; i<cnt+2; i++) {
                const h = getHebrewNumber(i);
                p.push({id:`${i}a`, label:`דף ${h} ע"א`});
                p.push({id:`${i}b`, label:`דף ${h} ע"ב`});
            }
            return p;
        };

        const generateMishnayot = (chaptersArr) => {
            const units = [];
            chaptersArr.forEach((count, idx) => {
                const cNum = idx + 1;
                const cHeb = getHebrewNumber(cNum);
                for(let m=1; m<=count; m++) {
                    units.push({
                        id: `p${cNum}_m${m}`,
                        label: `משנה ${getHebrewNumber(m)}`,
                        chapterTitle: `פרק ${cHeb}`,
                        chapterId: cNum,
                        isMishna: true
                    });
                }
            });
            return units;
        };

        const TRACK_GEMARA = { id: 'gemara', title: 'גמרא', sections: window.SHAS_GEMARA_DATA.map((s,i)=>({ id: `gs_${i}`, title: s.name, books: s.books.map((b,bi)=>({ id: `gb_${s.id}_${b.id}`, title: b.n, type: 'pages', units: generateGemaraPages(b.p) })) })) };
        const TRACK_MISHNA = { id: 'mishna', title: 'משניות', sections: window.MISHNA_DATA.map((s,i)=>({ id: `ms_${i}`, title: s.name, books: s.books.map((b,bi)=>({ id: `mb_${s.id}_${b.id}`, title: b.n, type: 'mishna', units: generateMishnayot(b.c) })) })) };
        const ALL_TRACKS = [TRACK_GEMARA, TRACK_MISHNA];

        const AdminUserManagement = ({ users, fetchUsers }) => {
            const [formData, setForm] = useState({username:'', password:'', role:'student', email:''});
            const [editingUser, setEditingUser] = useState(null);

            const saveUser = () => {
                if(!formData.username) return;
                const url = editingUser ? `${API_URL}/api/users/${editingUser.id}` : `${API_URL}/api/users`;
                const method = editingUser ? 'PUT' : 'POST';
                fetch(url, { method, headers:{'Content-Type':'application/json'}, body: JSON.stringify(formData) })
                .then(r=>r.json()).then(d => {
                    if(d.ok) { alert(editingUser ? "עודכן בהצלחה!" : "משתמש נוסף!"); setForm({username:'', password:'', role:'student', email:''}); setEditingUser(null); fetchUsers(); }
                    else alert(d.error);
                });
            };

            const toggleSuspend = (u) => {
                fetch(`${API_URL}/api/users/${u.id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({is_suspended: !u.is_suspended}) })
                .then(r=>r.json()).then(d=>{ if(d.ok) fetchUsers(); });
            };

            return (
                <div className="bg-white p-6 rounded-xl border mt-6">
                    <h2 className="text-xl font-bold mb-4">{editingUser ? `עריכת משתמש: ${editingUser.username}` : 'ניהול והוספת משתמשים'}</h2>
                    <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6 bg-slate-50 p-4 rounded-lg items-end">
                        <input className="border p-2 rounded" placeholder="שם משתמש" value={formData.username} onChange={e=>setForm({...formData, username:e.target.value})} />
                        <input className="border p-2 rounded" placeholder="אימייל (אופציונלי)" value={formData.email} onChange={e=>setForm({...formData, email:e.target.value})} />
                        <input className="border p-2 rounded" placeholder="סיסמה (ריק=ללא שינוי)" type="password" value={formData.password} onChange={e=>setForm({...formData, password:e.target.value})} />
                        <select className="border p-2 rounded" value={formData.role} onChange={e=>setForm({...formData, role:e.target.value})}>
                            <option value="student">תלמיד</option><option value="admin">אדמין ראשי</option>
                        </select>
                        <div className="flex gap-2">
                            <button onClick={saveUser} className="bg-blue-600 text-white px-4 py-2 rounded font-bold w-full">{editingUser?'שמור':'הוסף'}</button>
                            {editingUser && <button onClick={()=>{setEditingUser(null);setForm({username:'', password:'', role:'student', email:''})}} className="bg-gray-400 text-white px-4 py-2 rounded">ביטול</button>}
                        </div>
                    </div>
                    <table className="w-full text-right text-sm">
                        <thead className="bg-gray-100"><tr><th className="p-2">ID</th><th className="p-2">שם</th><th className="p-2">אימייל</th><th className="p-2">תפקיד</th><th className="p-2">רמה/XP</th><th className="p-2">סטטוס</th><th className="p-2">פעולות</th></tr></thead>
                        <tbody>
                            {users.map(u => (
                                <tr key={u.id} className="border-b">
                                    <td className="p-2">{u.id}</td><td className="p-2 font-bold">{u.username}</td><td className="p-2">{u.email}</td><td className="p-2">{u.role}</td>
                                    <td className="p-2">{u.level} <span className="text-xs text-gray-500">({u.xp} XP)</span></td>
                                    <td className="p-2"><span className={`px-2 py-1 rounded text-xs ${u.is_suspended?'bg-red-100 text-red-700':'bg-green-100 text-green-700'}`}>{u.is_suspended?'מושעה':'פעיל'}</span></td>
                                    <td className="p-2 flex gap-2">
                                        <button onClick={()=>{setEditingUser(u);setForm({username:u.username, role:u.role, email:u.email||'', password:''})}} className="text-blue-600">✏️ ערוך</button>
                                        <button onClick={()=>toggleSuspend(u)} className="text-orange-600">{u.is_suspended?'✅ שחרר':'🚫 השעה'}</button>
                                        <button onClick={()=>{if(confirm('למחוק לצמיתות?')) fetch(`${API_URL}/api/users/${u.id}`,{method:'DELETE'}).then(()=>fetchUsers())}} className="text-red-600">🗑️</button>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        };

        const MishnaBookView = ({ book, progress, toggleKey, handleMD, handleME }) => {
            const chapters = useMemo(() => {
                const map = {};
                book.units.forEach(u => {
                    if(!map[u.chapterId]) map[u.chapterId] = { id: u.chapterId, title: u.chapterTitle, units: [] };
                    map[u.chapterId].units.push(u);
                });
                return Object.values(map);
            }, [book]);

            const [openChapter, setOpenChapter] = useState(null);

            return (
                <div className="space-y-2">
                    {chapters.map(chapter => {
                        const completed = chapter.units.filter(u => {
                            const progObj = progress[`${book.id}_${u.id}`];
                            return progObj && progObj.is_done;
                        }).length;
                        const isFull = completed === chapter.units.length;
                        const isOpen = openChapter === chapter.id;

                        return (
                            <div key={chapter.id} className="border rounded-lg bg-white overflow-hidden">
                                <button onClick={() => setOpenChapter(isOpen?null:chapter.id)} className={`w-full flex justify-between items-center p-3 hover:bg-gray-50 ${isFull?'bg-emerald-50 text-emerald-800':''}`}>
                                    <span className="font-bold">{chapter.title}</span>
                                    <div className="flex gap-3 text-sm text-gray-500 items-center">
                                        <span>{completed}/{chapter.units.length}</span>
                                        <button onClick={(e) => {
                                            e.stopPropagation();
                                            if(confirm(`לסמן את כל ${chapter.title}?`)) {
                                                chapter.units.forEach(u => toggleKey(`${book.id}_${u.id}`, true));
                                            }
                                        }} className="text-xs bg-emerald-100 text-emerald-800 px-3 py-1 rounded hover:bg-emerald-200 font-bold">✅ סמן פרק</button>
                                        <span>{isOpen?'▼':'◀'}</span>
                                    </div>
                                </button>
                                <div className={`chapter-content bg-slate-50 ${isOpen?'open':''}`}>
                                    <div className="p-3 grid grid-cols-3 sm:grid-cols-6 gap-2">
                                        {chapter.units.map(u => {
                                             const k = `${book.id}_${u.id}`;
                                             const progObj = progress[k];
                                             const d = progObj && progObj.is_done;
                                             const isA = progObj && progObj.is_auto;
                                             return <button key={u.id} onMouseDown={()=>handleMD(u.id,k)} onMouseEnter={()=>handleME(u.id,k)} className={`p-2 rounded border text-sm ${d?'bg-emerald-600 text-white':'bg-white'}`}>{u.label.replace('משנה ','')} {d&&isA&&<div className="auto-badge">A</div>}</button>;
                                        })}
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('student');
            const [tab, setTab] = useState('study');
            const [loginData, setLoginData] = useState({username:'', password:''});
            const [selectedTrack, setSelectedTrack] = useState(ALL_TRACKS[0]);
            const [activeSecId, setSecId] = useState(ALL_TRACKS[0].sections[0].id);
            const [activeBookId, setBookId] = useState(ALL_TRACKS[0].sections[0].books[0].id);
            const [progress, setProgress] = useState({});
            const [feed, setFeed] = useState([]);
            const [messages, setMessages] = useState([]);
            const [adminUsers, setAdminUsers] = useState([]);
            const [isAutoEnabled, setAutoEnabled] = useState(false);

            const fetchUsersList = () => {
                if(user && user.role === 'admin') {
                    fetch(`${API_URL}/api/users`).then(r=>r.json()).then(setAdminUsers);
                }
            };

            useEffect(() => {
                if(user) {
                    fetch(`${API_URL}/api/get_progress?user_id=${user.id}`).then(r=>r.json()).then(setProgress);
                    fetch(`${API_URL}/api/feed`).then(r=>r.json()).then(setFeed);
                    fetch(`${API_URL}/api/messages?user_id=${user.id}`).then(r=>r.json()).then(setMessages);
                    fetchUsersList();
                    loadPosition(selectedTrack.id);
                }
            }, [user]);

            const loadPosition = (tid) => {
                fetch(`${API_URL}/api/last_position?user_id=${user.id}&track_id=${tid}`).then(r=>r.json()).then(data => {
                    if(data.ok) { setSecId(data.position.section_id); setBookId(data.position.book_id); }
                });
            };

            const changeTrack = (tid) => {
                const t = ALL_TRACKS.find(x=>x.id===tid);
                setSelectedTrack(t);
                setSecId(t.sections[0].id); setBookId(t.sections[0].books[0].id);
                loadPosition(tid);
            };

            useEffect(() => {
                if(user && activeSecId && activeBookId) {
                    fetch(`${API_URL}/api/last_position`, { method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ user_id: user.id, track_id: selectedTrack.id, section_id: activeSecId, book_id: activeBookId })
                    });
                }
            }, [activeSecId, activeBookId]);

            const activeTrack = selectedTrack;
            const activeSec = activeTrack.sections.find(s=>s.id===activeSecId) || activeTrack.sections[0];
            const activeBook = activeSec.books.find(b=>b.id===activeBookId) || activeSec.books[0];

            const toggleKey = (k, f=null) => {
                const progObj = progress[k];
                const isCurrentlyDone = progObj && progObj.is_done;
                const ns = f!==null ? f : !isCurrentlyDone;
                setProgress(p=>({...p, [k]: {is_done: ns, is_auto: isAutoEnabled}}));
                fetch(`${API_URL}/api/toggle_page`,{method:'POST',headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({user_id:user.id, key:k, force_state:ns, is_auto:isAutoEnabled})
                }).then(r=>r.json()).then(d => {
                    setUser(u => ({...u, xp: d.xp, level: d.level}));
                });
            };

            const [isDragging, setIsDragging] = useState(false);
            const [dragState, setDragState] = useState(null);
            
            const handleMD = (uid, k) => { setIsDragging(true); const progObj = progress[k]; const ns = !(progObj && progObj.is_done); setDragState(ns); toggleKey(k, ns); };
            const handleME = (uid, k) => { if(isDragging) toggleKey(k, dragState); };
            useEffect(()=>{const u=()=>setIsDragging(false);window.addEventListener('mouseup',u);return()=>window.removeEventListener('mouseup',u)},[]);

            const doLogin = () => {
                window.grecaptcha.ready(() => { window.grecaptcha.execute(RECAPTCHA_SITE_KEY, {action: 'login'}).then(token => {
                    fetch(`${API_URL}/api/login`, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({...loginData, recaptcha_token: token})})
                    .then(r=>r.json()).then(d=>{if(d.ok) setUser(d.user); else alert(d.error);});
                })});
            };

            if(!user) return (
                <div className="flex items-center justify-center min-h-screen bg-slate-100 p-4">
                    <div className="bg-white p-8 rounded-2xl shadow-xl text-center max-w-md w-full">
                        <h1 className="text-2xl font-bold mb-6 text-blue-800">מערכת "עץ חיים"</h1>
                        <input className="w-full border p-3 rounded-lg mb-3" placeholder="שם משתמש" value={loginData.username} onChange={e=>setLoginData({...loginData,username:e.target.value})} onKeyDown={e=>e.key==='Enter'&&doLogin()}/>
                        <input className="w-full border p-3 rounded-lg mb-4" type="password" placeholder="סיסמה" value={loginData.password} onChange={e=>setLoginData({...loginData,password:e.target.value})} onKeyDown={e=>e.key==='Enter'&&doLogin()}/>
                        <button onClick={doLogin} className="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700">כניסה למערכת</button>
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col flex-1">
                    <header className="bg-white border-b px-4 py-3 flex justify-between items-center shadow-sm sticky top-0 z-30">
                        <div><span className="font-bold text-blue-900">עץ חיים</span></div>
                        <div className="flex gap-4 items-center">
                            {user.role === 'admin' && <button onClick={()=>setView(view==='admin'?'student':'admin')} className="text-sm font-bold text-blue-600">{view==='admin'?'תצוגת לומד':'אדמין'}</button>}
                            <div className="text-left text-sm bg-amber-50 px-3 py-1 rounded border border-amber-200">
                                <b>{user.level}</b> <span className="text-amber-600 font-bold">({user.xp} XP)</span>
                            </div>
                            <button onClick={()=>setUser(null)} className="text-red-500">🚪</button>
                        </div>
                    </header>

                    {view === 'admin' ? (
                        <main className="p-4 max-w-7xl mx-auto w-full"><AdminUserManagement users={adminUsers} fetchUsers={fetchUsersList} /></main>
                    ) : (
                        <main className="p-4 max-w-7xl mx-auto w-full flex-1">
                            <div className="flex gap-4 border-b mb-4 pb-2">
                                <button onClick={()=>setTab('study')} className={`font-bold ${tab==='study'?'text-blue-600 border-b-2 border-blue-600':'text-gray-500'}`}>מסלול לימוד</button>
                                <button onClick={()=>setTab('quest')} className={`font-bold ${tab==='quest'?'text-blue-600 border-b-2 border-blue-600':'text-gray-500'}`}>קווסטים וקהילה 🏆</button>
                            </div>

                            {tab === 'quest' ? (
                                <div className="grid md:grid-cols-2 gap-6">
                                    <div className="bg-gradient-to-br from-indigo-50 to-purple-50 p-6 rounded-xl border border-indigo-100 shadow-sm">
                                        <h3 className="text-xl font-bold mb-4 text-indigo-900">לוח הישגים אונליין</h3>
                                        <div className="space-y-3">
                                            {feed.map(f => (
                                                <div key={f.id} className="bg-white p-3 rounded-lg shadow-sm text-sm flex justify-between items-center">
                                                    <div><strong className="text-blue-800">{f.username}</strong>: {f.content} <span className="text-xs text-gray-400">({f.time})</span></div>
                                                    {f.user_id !== user.id && <button onClick={()=>{fetch(`${API_URL}/api/messages`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sender_id:user.id,sender_name:user.name,receiver_id:f.user_id,content:'כל הכבוד! יישר כוח עצום! 💪'})}).then(()=>alert('הודעת פרגון נשלחה!'))}} className="bg-emerald-100 text-emerald-800 px-2 py-1 rounded text-xs font-bold hover:bg-emerald-200">פרגן 👏</button>}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="bg-white p-6 rounded-xl border shadow-sm">
                                        <h3 className="font-bold mb-4">הודעות נכנסות</h3>
                                        {messages.length===0 && <div className="text-gray-400 text-sm">אין הודעות חדשות.</div>}
                                        {messages.map(m => (
                                            <div key={m.id} className={`p-3 mb-2 rounded border ${!m.is_read?'bg-blue-50 border-blue-200':'bg-gray-50'}`}>
                                                <div className="text-xs text-gray-500 mb-1">מאת: {m.sender} | {m.time}</div>
                                                <div className="font-medium">{m.content}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <div>
                                    <div className="flex flex-col md:flex-row gap-4 justify-between items-center bg-white p-4 rounded-xl border shadow-sm mb-6">
                                        <div className="flex gap-2">
                                            {ALL_TRACKS.map(t => <button key={t.id} onClick={()=>changeTrack(t.id)} className={`px-6 py-2 rounded-full font-bold ${selectedTrack.id===t.id?'bg-blue-600 text-white':'bg-slate-100 text-gray-600'}`}>{t.title}</button>)}
                                        </div>
                                        <label className="flex items-center gap-2 cursor-pointer bg-blue-50 px-4 py-2 rounded-lg border border-blue-200">
                                            <input type="checkbox" checked={isAutoEnabled} onChange={e=>setAutoEnabled(e.target.checked)} className="w-4 h-4 cursor-pointer"/>
                                            <span className="font-bold text-sm text-blue-800">סימון אוטומטי (בוט/מערכת)</span>
                                        </label>
                                    </div>
                                    
                                    <div className="bg-white p-4 rounded-xl border flex gap-3 mb-4">
                                        <select className="border p-2 rounded-lg flex-1 bg-slate-50" value={activeSecId} onChange={e=>{const s=activeTrack.sections.find(x=>x.id===e.target.value);setSecId(s.id);setBookId(s.books[0].id)}}>{activeTrack.sections.map(s=><option key={s.id} value={s.id}>{s.title}</option>)}</select>
                                        <select className="border p-2 rounded-lg flex-1 bg-slate-50" value={activeBookId} onChange={e=>setBookId(e.target.value)}>{activeSec.books.map(b=><option key={b.id} value={b.id}>{b.title}</option>)}</select>
                                    </div>

                                    <div className="bg-white p-6 rounded-xl border shadow-sm">
                                        <h2 className="font-bold text-lg mb-4">{activeBook.title} - גרור אצבע/עכבר כדי לסמן ברצף</h2>
                                        {activeBook.type === 'mishna' ? (
                                            <MishnaBookView book={activeBook} progress={progress} toggleKey={toggleKey} handleMD={handleMD} handleME={handleME} />
                                        ) : (
                                            <div className="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-3">
                                                {activeBook.units.map(u => {
                                                    const k = `${activeBook.id}_${u.id}`;
                                                    const progObj = progress[k];
                                                    const d = progObj && progObj.is_done;
                                                    const isA = progObj && progObj.is_auto;
                                                    return <button key={u.id} onMouseDown={()=>handleMD(u.id,k)} onMouseEnter={()=>handleME(u.id,k)} className={`page-btn p-3 rounded-lg border text-sm font-medium ${d?'bg-blue-600 text-white shadow-md':'bg-slate-50 text-gray-600'}`}>
                                                        {u.label} {d&&"✓"} {d&&isA&&<div className="auto-badge">A</div>}
                                                    </button>;
                                                })}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </main>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
