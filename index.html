        const getHebrewNumber = (num) => {
            if (num <= 0) return "";
            const letters = [{v:400,c:'ת'},{v:300,c:'ש'},{v:200,c:'ר'},{v:100,c:'ק'},{v:90,c:'צ'},{v:80,c:'פ'},{v:70,c:'ע'},{v:60,c:'ס'},{v:50,c:'נ'},{v:40,c:'מ'},{v:30,c:'ל'},{v:20,c:'כ'},{v:10,c:'י'},{v:9,c:'ט'},{v:8,c:'ח'},{v:7,c:'ז'},{v:6,c:'ו'},{v:5,c:'ה'},{v:4,c:'ד'},{v:3,c:'ג'},{v:2,c:'ב'},{v:1,c:'א'}];
            let str = "", temp = num;
            if (temp === 15) return "טו"; if (temp === 16) return "טז";
            for (let l of letters) { while(temp >= l.v) { str += l.c; temp -= l.v; } }
            return str.length === 1 ? str+"'" : str.slice(0,-1)+'"'+str.slice(-1);
        };

        const generateGemaraPages = (cnt) => {
            const p = [];
            for(let i=2; i<cnt+2; i++) {
                const h = getHebrewNumber(i);
                p.push({id:`${i}a`, label:`דף ${h} ע"א`});
                p.push({id:`${i}b`, label:`דף ${h} ע"ב`});
            }
            return p;
        };

            const units = [];
            chaptersArr.forEach((count, idx) => {
                const cNum = idx + 1;
                const cHeb = getHebrewNumber(cNum);
                for(let m=1; m<=count; m++) {
                    units.push({
                        id: `p${cNum}_m${m}`,
                        label: `משנה ${getHebrewNumber(m)}`,
                        chapterTitle: `פרק ${cHeb}`,
                        chapterId: cNum,
                        isMishna: true
                    });
                }
            });
            return units;
        };

        const AdminStats = () => {
            const [stats, setStats] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetch(`${API_URL}/api/users`).then(r => r.json()).then(async (users) => {
                    const promises = users.map(async (u) => {
                        const res = await fetch(`${API_URL}/api/get_progress?user_id=${u.id}`);
                        const data = await res.json();
                        
                        const gCycles = data.filter(k => k.startsWith('siyum_gemara_')).length;
                        const mCycles = data.filter(k => k.startsWith('siyum_mishna_')).length;
                        
                        const cgPrefix = gCycles === 0 ? '' : `c${gCycles + 1}_`;
                        const cmPrefix = mCycles === 0 ? '' : `c${mCycles + 1}_`;
                        
                        const gemaraDone = data.filter(k => k.startsWith(cgPrefix + 'gb_')).length;
                        const mishnaDone = data.filter(k => k.startsWith(cmPrefix + 'mb_')).length;
                        
                        return { ...u, gemaraDone, mishnaDone, gCycles, mCycles };
                    });
                    const results = await Promise.all(promises);
                    setStats(results);
                    setLoading(false);
                });
            }, []);

            if (loading) return <div className="text-center p-4">טוען נתונים...</div>;

            return (

                                    const mishnaPct = ((s.mishnaDone / MISHNA_TOTAL) * 100).toFixed(1);
                                    return (
                                        <tr key={s.id} className="border-b hover:bg-slate-50">
                                            <td className="p-3 font-medium">{s.username} <span className="text-xs text-gray-400">({s.role})</span></td>
                                            <td className="p-3 border-r text-blue-600 font-bold">{s.gemaraDone} / {GEMARA_TOTAL}</td>
                                            <td className="p-3">
                                                <div className="flex items-center gap-2 w-24">
                                                    <div className="flex-1 bg-gray-200 h-2 rounded-full"><div className="bg-blue-600 h-2 rounded-full" style={{width:`${Math.min(gemaraPct,100)}%`}}></div></div>
                                                    <span className="text-xs w-8">{gemaraPct}%</span>
                                                </div>
                                            </td>
                                            <td className="p-3 text-center text-amber-600 font-bold">{s.gCycles}</td>
                                            <td className="p-3 border-r text-emerald-600 font-bold">{s.mishnaDone} / {MISHNA_TOTAL}</td>
                                            <td className="p-3">
                                                <div className="flex items-center gap-2 w-24">

                                                    <span className="text-xs w-8">{mishnaPct}%</span>
                                                </div>
                                            </td>
                                            <td className="p-3 text-center text-amber-600 font-bold">{s.mCycles}</td>

        const AdminPanel = () => {

            useEffect(() => { fetchUsers(); }, []);

            return (
                <div>

                        <button onClick={()=>setTab('dedications')} className={`pb-2 px-4 font-bold ${tab==='dedications' ? 'border-b-2 border-blue-600 text-blue-600' : 'text-gray-500'}`}>הקדשות</button>

                    {tab === 'stats' && <AdminStats />}

                    {tab === 'dedications' && <AdminDedications />}

        // --- קומפוננטות תלמיד ---

        const MishnaBookView = ({ book, progress, toggleKey, getActualKey }) => {
            const chapters = useMemo(() => {
                const map = {};
                book.units.forEach(u => {
                    if(!map[u.chapterId]) map[u.chapterId] = { id: u.chapterId, title: u.chapterTitle, units: [] };
                    map[u.chapterId].units.push(u);
                });
                return Object.values(map);
            }, [book]);

            const [openChapter, setOpenChapter] = useState(null);

            return (
                <div className="space-y-2">
                    {chapters.map(chapter => {
                        const completed = chapter.units.filter(u => progress[getActualKey(`${book.id}_${u.id}`)]).length;
                        const isFull = completed === chapter.units.length;
                        const isOpen = openChapter === chapter.id;

                        return (
                            <div key={chapter.id} className="border rounded-lg bg-white overflow-hidden">
                                <button onClick={() => setOpenChapter(isOpen?null:chapter.id)} className={`w-full flex justify-between items-center p-3 hover:bg-gray-50 ${isFull?'bg-emerald-50 text-emerald-800':''}`}>
                                    <span className="font-bold">{chapter.title}</span>
                                    <div className="flex gap-3 text-sm text-gray-500 items-center">
                                        <span>{completed}/{chapter.units.length}</span>
                                        <button onClick={(e) => {
                                            e.stopPropagation();
                                            if(confirm(`לסמן את כל ${chapter.title}?`)) {
                                                chapter.units.forEach(u => toggleKey(`${book.id}_${u.id}`, true));
                                            }
                                        }} className="text-xs bg-emerald-100 text-emerald-800 px-3 py-1 rounded hover:bg-emerald-200 font-bold">✅ סמן פרק</button>
                                        <span>{isOpen?'▼':'◀'}</span>
                                    </div>
                                </button>
                                <div className={`chapter-content bg-slate-50 ${isOpen?'open':''}`}>
                                    <div className="p-3 grid grid-cols-3 sm:grid-cols-6 gap-2">
                                        {chapter.units.map(u => {
                                             const k = `${book.id}_${u.id}`;
                                             const actualKey = getActualKey(k);
                                             return <button key={u.id} onClick={()=>toggleKey(k)} className={`p-2 rounded border text-sm ${progress[actualKey]?'bg-emerald-600 text-white':'bg-white'}`}>{u.label.replace('משנה ','')}</button>;
                                        })}
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('student');
            const [loginData, setLoginData] = useState({username:'', password:''});
            const [loginError, setLoginError] = useState('');
            
            const [selectedTrack, setSelectedTrack] = useState(ALL_TRACKS[0]);
            const [activeSecId, setSecId] = useState(ALL_TRACKS[0].sections[0].id);
            const [activeBookId, setBookId] = useState(ALL_TRACKS[0].sections[0].books[0].id);
            const [progress, setProgress] = useState({});
            const [positionLoaded, setPositionLoaded] = useState(false);
            
            const [toastMessage, setToastMessage] = useState('');
            const [toastVisible, setToastVisible] = useState(false);

            const showToast = (msg) => {
                setToastMessage(msg);
                setToastVisible(true);
            };

            const gemaraCycles = useMemo(() => Object.keys(progress).filter(k => k.startsWith('siyum_gemara_')).length, [progress]);
            const mishnaCycles = useMemo(() => Object.keys(progress).filter(k => k.startsWith('siyum_mishna_')).length, [progress]);
            
            const currentGemaraPrefix = gemaraCycles === 0 ? '' : `c${gemaraCycles + 1}_`;
            const currentMishnaPrefix = mishnaCycles === 0 ? '' : `c${mishnaCycles + 1}_`;
            
            const getActualKey = (k) => {
                if(k.startsWith('gb_')) return currentGemaraPrefix + k;
                if(k.startsWith('mb_')) return currentMishnaPrefix + k;
                return k;
            };

            // טעינת נתונים והמיקום האחרון
            useEffect(() => {
                if (user) {
                    // טעינת התקדמות
                    fetch(`${API_URL}/api/get_progress?user_id=${user.id}`)
                        .then(r=>r.json())
                        .then(k=>{const p={};k.forEach(x=>p[x]=true);setProgress(p)});
                    
                    // טעינת מיקום אחרון
                    fetch(`${API_URL}/api/last_position?user_id=${user.id}`)
                        .then(r => r.json())
                        .then(data => {
                            if (data.ok && data.position) {
                                const pos = data.position;
                                const track = ALL_TRACKS.find(t => t.id === pos.track_id);
                                if (track) {
                                    const section = track.sections.find(s => s.id === pos.section_id);
                                    if (section) {
                                        const book = section.books.find(b => b.id === pos.book_id);
                                        if (book) {
                                            setSelectedTrack(track);
                                            setSecId(pos.section_id);
                                            setBookId(pos.book_id);
                                        }
                                    }
                                }
                            }
                        })
                        .catch(err => console.log('No saved position found'))
                        .finally(() => {
                            setPositionLoaded(true);
                        });
                }
            }, [user]);

            // שמירת מיקום אחרון בכל שינוי (רק אחרי שהמיקום מהשרת נטען)
            useEffect(() => {
                if (positionLoaded && user && selectedTrack && activeSecId && activeBookId) {
                    fetch(`${API_URL}/api/last_position`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            user_id: user.id,
                            track_id: selectedTrack.id,
                            section_id: activeSecId,
                            book_id: activeBookId
                        })
                    });
                }
            }, [positionLoaded, user, selectedTrack, activeSecId, activeBookId]);

            // ניהול מסלול פעיל
            const activeTrack = selectedTrack;
            const activeSec = activeTrack.sections.find(s=>s.id===activeSecId) || activeTrack.sections[0];
            const activeBook = activeSec.books.find(b=>b.id===activeBookId) || activeSec.books[0];

            // סטטיסטיקות
            const stats = useMemo(() => {
                const bookTotal = activeBook.units.length;
                const bookDone = activeBook.units.filter(u => progress[getActualKey(`${activeBook.id}_${u.id}`)]).length;
                
                const trackPrefix = selectedTrack.id === 'gemara' ? 'gb_' : 'mb_';
                const actualPrefix = selectedTrack.id === 'gemara' ? currentGemaraPrefix : currentMishnaPrefix;
                const trackTotal = selectedTrack.id === 'gemara' ? GEMARA_TOTAL : MISHNA_TOTAL;
                
                const trackDone = Object.keys(progress).filter(k => k.startsWith(actualPrefix + trackPrefix)).length;

                return { bookTotal, bookDone, trackTotal, trackDone };
            }, [progress, activeBook, selectedTrack, currentGemaraPrefix, currentMishnaPrefix]);

            const changeTrack = (tid) => {
                const t = ALL_TRACKS.find(x=>x.id===tid);
                setSelectedTrack(t); setSecId(t.sections[0].id); setBookId(t.sections[0].books[0].id);
            };

            const toggleKey = (k, f=null) => {
                const actualKey = k.startsWith('siyum_') ? k : getActualKey(k);
                const ns = f!==null?f:!progress[actualKey];
                setProgress(p=>({...p,[actualKey]:ns}));
                fetch(`${API_URL}/api/toggle_page`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:user.id,key:actualKey,force_state:ns})})
                    .then(() => showToast('השינויים נשמרו בהצלחה!'));
            };

            // גרירה
            const [isDragging, setIsDragging] = useState(false);
            const [dragState, setDragState] = useState(null);
            const handleMD = (uid,d) => { if(activeBook.type==='pages'){ setIsDragging(true); setDragState(!d); toggleKey(`${activeBook.id}_${uid}`); }};
            const handleME = (uid) => { if(isDragging && activeBook.type==='pages') toggleKey(`${activeBook.id}_${uid}`, dragState); };
            useEffect(()=>{const u=()=>setIsDragging(false);window.addEventListener('mouseup',u);return()=>window.removeEventListener('mouseup',u)},[]);

            // לוגין
            const doLogin = () => {
                if (!window.grecaptcha) {
                    setLoginError("שגיאת טעינת reCAPTCHA");
                    return;
                }
                window.grecaptcha.ready(() => {
                    window.grecaptcha.execute(RECAPTCHA_SITE_KEY, {action: 'login'}).then((token) => {
                         fetch(`${API_URL}/api/login`, {
                             method: 'POST',
                             headers: {'Content-Type': 'application/json'},
                             body: JSON.stringify({...loginData, recaptcha_token: token})
                         })
                         .then(r=>r.json())
                         .then(d=>{if(d.ok){setUser(d.user);setLoginError('')}else setLoginError(d.error)});
                    });
                });
            };

            // יציאה בטוחה
            const handleLogout = () => {
                setUser(null);
                setLoginData({username:'', password:''});
                setPositionLoaded(false);
            };

            if(!user) return (
                <div className="flex flex-col min-h-screen">
                    <div className="flex-1 flex items-center justify-center bg-slate-100 p-4">
                        <div className="w-full max-w-md">
                            <DedicationsDisplay />
                            <div className="bg-white p-8 rounded-2xl shadow-xl text-center">
                                <h1 className="text-2xl font-bold mb-6 text-blue-800">מערכת "עץ חיים"</h1>
                                <input className="w-full border p-3 rounded-lg mb-3 text-right" placeholder="שם משתמש" value={loginData.username} onChange={e=>setLoginData({...loginData,username:e.target.value})} onKeyDown={e=>e.key==='Enter'&&doLogin()}/>
                                <input className="w-full border p-3 rounded-lg mb-3 text-right" type="password" placeholder="סיסמה" value={loginData.password} onChange={e=>setLoginData({...loginData,password:e.target.value})} onKeyDown={e=>e.key==='Enter'&&doLogin()}/>
                                <button onClick={doLogin} className="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700">כניסה למערכת</button>
                                {loginError && <p className="text-red-500 mt-4 text-sm">{loginError}</p>}
                                <div className="text-xs text-gray-400 mt-4">מוגן על ידי reCAPTCHA <br/>
                                    <a href="https://policies.google.com/privacy" target="_blank" className="underline">מדיניות פרטיות</a> ו
                                    <a href="https://policies.google.com/terms" target="_blank" className="underline">תנאי שימוש</a>
                                </div>
                            </div>
                        </div>
                    </div>
                    <footer className="bg-slate-800 text-slate-400 text-center py-4 text-xs">פותח על ידי OrelAI <a href="mailto:ubriga@gmail.com" className="underline">ubriga@gmail.com</a></footer>
                </div>
            );

            return (
                <div className="flex flex-col flex-1">
                    <Toast message={toastMessage} isVisible={toastVisible} onClose={() => setToastVisible(false)} />
                    <header className="bg-white border-b sticky top-0 z-30 px-4 py-3 shadow-sm flex justify-between items-center">
                        <div><span className="font-bold text-lg text-blue-900 block">עץ חיים LMS</span><span className="text-[10px] text-gray-400">by OrelAI</span></div>
                        <nav className="flex items-center gap-4">
                            {user.role === 'admin' && <button onClick={()=>setView(view==='admin'?'student':'admin')} className="text-sm font-bold text-blue-600">{view==='admin'?'חזרה ללומד':'ממשק מנהל'}</button>}
                            <span className="text-xs font-bold bg-slate-100 px-2 py-1 rounded">{user.name}</span>
                            <button onClick={handleLogout} className="text-red-500" title="יציאה">🚪</button>
                        </nav>
                    </header>
                    <div className="bg-slate-50 py-4">
                        <DedicationsDisplay />
                    </div>
                    <main className="max-w-7xl mx-auto p-4 w-full flex-1">
                        {view === 'admin' ? <AdminPanel /> : (
                            <div className="space-y-6">
                            
                                <div className="flex justify-around bg-gradient-to-r from-amber-50 to-orange-50 p-4 rounded-xl border border-amber-200 mb-6 shadow-sm">
                                    <div className="text-center">
                                        <div className="text-sm text-amber-800 font-bold">סיומי ש"ס גמרא</div>
                                        <div className="text-3xl text-amber-600 font-black">{gemaraCycles}</div>
                                    </div>
                                    <div className="text-center">
                                        <div className="text-sm text-amber-800 font-bold">סיומי ש"ס משניות</div>
                                        <div className="text-3xl text-amber-600 font-black">{mishnaCycles}</div>
                                    </div>
                                </div>
                                
                                {stats.trackDone === stats.trackTotal && stats.trackTotal > 0 && (
                                    <div className="bg-amber-100 border-2 border-amber-400 p-4 rounded-xl text-center shadow-lg my-4 animate-pulse">
                                        <h3 className="text-xl font-bold text-amber-800 mb-2">🎉 חזק וברוך! סיימת את כל ה{selectedTrack.title}! 🎉</h3>
                                        <button onClick={() => {
                                            if(confirm('האם תרצה להתחיל מחזור חדש? הנתונים הקודמים יישמרו ותוכל להתחיל לסמן מחדש.')) {
                                                toggleKey(selectedTrack.id === 'gemara' ? `siyum_gemara_${gemaraCycles+1}` : `siyum_mishna_${mishnaCycles+1}`, true);
                                            }
                                        }} className="bg-amber-500 text-white px-6 py-2 rounded-full font-bold hover:bg-amber-600 shadow-md">
                                            התחל מחזור חדש
                                        </button>
                                    </div>
                                )}

                                <div className="flex justify-center gap-4">
                                    {ALL_TRACKS.map(t => <button key={t.id} onClick={()=>changeTrack(t.id)} className={`px-6 py-2 rounded-full font-bold transition ${selectedTrack.id===t.id?'bg-blue-600 text-white shadow-lg':'bg-white text-gray-600 border'}`}>{t.title}</button>)}
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="bg-white p-5 rounded-xl border shadow-sm">
                                        <div className="text-sm text-gray-500 mb-1">התקדמות ב{activeBook.title}</div>
                                        <div className="text-2xl font-bold text-blue-600">{stats.bookDone} / {stats.bookTotal}</div>
                                        <div className="w-full bg-gray-200 h-2 rounded-full mt-2"><div className="bg-blue-600 h-2 rounded-full" style={{width:`${(stats.bookDone/stats.bookTotal)*100}%`}}></div></div>
                                    </div>
                                    <div className="bg-white p-5 rounded-xl border shadow-sm">
                                        <div className="text-sm text-gray-500 mb-1">התקדמות במסלול ({selectedTrack.title})</div>
                                        <div className="text-2xl font-bold text-amber-600">{stats.trackDone} / {stats.trackTotal}</div>
                                        <div className="w-full bg-gray-200 h-2 rounded-full mt-2"><div className="bg-amber-500 h-2 rounded-full" style={{width:`${(stats.trackDone/stats.trackTotal)*100}%`}}></div></div>
                                    </div>
                                </div>

                                <div className="bg-white p-4 rounded-xl border shadow-sm flex flex-col sm:flex-row gap-3 sticky top-16 z-20">
                                    <select className="border p-2 rounded-lg flex-1 bg-slate-50" value={activeSecId} onChange={e=>{const s=activeTrack.sections.find(x=>x.id===e.target.value);setSecId(s.id);setBookId(s.books[0].id)}}>{activeTrack.sections.map(s=><option key={s.id} value={s.id}>{s.title}</option>)}</select>
                                    <select className="border p-2 rounded-lg flex-1 bg-slate-50" value={activeBookId} onChange={e=>setBookId(e.target.value)}>{activeSec.books.map(b=><option key={b.id} value={b.id}>{b.title}</option>)}</select>
                                </div>

                                {activeBook.type === 'mishna' ? (
                                    <MishnaBookView book={activeBook} progress={progress} toggleKey={toggleKey} getActualKey={getActualKey} />
                                ) : (
                                    <div className="bg-white p-6 rounded-xl border shadow-sm">
                                        <div className="flex justify-between items-center mb-4">
                                            <h2 className="font-bold text-lg">{activeBook.title}</h2>
                                            <button onClick={()=>{if(confirm("לסמן את כל המסכת?"))activeBook.units.forEach(u=>toggleKey(`${activeBook.id}_${u.id}`,true))}} className="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded font-bold">✅ סמן הכל</button>
                                        </div>
                                        <div className="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-3">
                                            {activeBook.units.map(u => {
                                                const k = `${activeBook.id}_${u.id}`; 
                                                const actualKey = getActualKey(k);
                                                const d = progress[actualKey];
                                                return <button key={u.id} onMouseDown={()=>handleMD(u.id,d)} onMouseEnter={()=>handleME(u.id)} className={`page-btn p-3 rounded-lg border text-sm font-medium ${d?'bg-blue-600 text-white shadow-md':'bg-slate-50 text-gray-600'}`}>{u.label} {d&&"✓"}</button>;
                                            })}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                    <footer className="bg-slate-800 text-slate-400 text-center py-4 text-xs">פותח על ידי OrelAI <a href="mailto:ubriga@gmail.com" className="underline">ubriga@gmail.com</a></footer>
                </div>
            );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
